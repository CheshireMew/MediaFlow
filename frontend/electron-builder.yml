appId: com.mediaflow.ui
productName: MediaFlow
directories:
  output: release
files:
  - from: .
    filter:
      - package.json
      - dist-electron/**/*
      - dist/index.html
      - dist/assets/**/*
      - dist/grid.svg
      - dist/vite.svg
      - "!dist/**/*.map"
      - "!dist-electron/**/*.map"

extraResources:
  - from: src/assets/fonts
    to: fonts
    filter:
      - "**/*"

  - from: src/shared/fontCatalog.json
    to: fontCatalog.json

  # ── bin/ ──────────────────────────────────────────────────
  # Stable desktop build only ships the core runtime.
  # Experimental preprocessing binaries stay in source/dev only.
  - from: ../bin
    to: bin
    filter:
      - "**/*"
      - "!python_env/**"
      - "!realesrgan/**"
      - "!realesrgan-ncnn-vulkan*"
      - "!realcugan/**"
      - "!realcugan*"
      - "!**/__pycache__/**"
      - "!**/tests/**"
      - "!**/test/**"
      - "!**/testing/**"
      - "!**/docs/**"
      - "!**/doc/**"
      - "!**/examples/**"
      - "!**/example/**"
      - "!**/*.md"
      - "!**/*.rst"
      - "!**/*.txt"

      # ── Exclude demo / sample files from realesrgan ──
      - "!realesrgan/*.mp4"
      - "!realesrgan/*.jpg"
      - "!realesrgan/*.png"
      - "!realesrgan/README*.md"

      - "!models/**/*.pth"

      # ── Exclude realcugan docs ──
      - "!realcugan/README.md"
      - "!realcugan/LICENSE"

  # ── dist-desktop-worker/ ──────────────────────────────────
  # PyInstaller-compiled Python desktop worker
  - from: ../dist-desktop-worker/mediaflow-desktop-worker
    to: desktop-worker
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/coverage/**"
      - "!**/pytest/**"
      - "!**/tests/**"
      - "!**/test/**"
      - "!**/testing/**"
      - "!**/Pythonwin/**"
      - "!**/pythonwin/**"
      - "!**/fastapi/**"
      - "!**/uvicorn/**"
      - "!**/torch/**"
      - "!**/torchaudio/**"
      - "!**/torchvision/**"
      - "!**/mmcv/**"
      - "!**/mmedit/**"
      - "!**/basicsr/**"
      - "!**/realesrgan/**"
      - "!**/_test*.pyd"
      - "!**/torch/bin/protoc.exe"
      - "!**/pytest-*.dist-info/**"
      - "!**/pytest_asyncio-*.dist-info/**"

win:
  target:
    - portable
  icon: resources/icon.ico
  artifactName: ${productName}-Portable-${version}.${ext}

